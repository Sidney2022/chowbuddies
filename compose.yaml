services:
  web:
    build: .
    command: gunicorn --bind 0.0.0.0:9000 --reload chowbuddies.wsgi:application #take out --reload in deployment
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - DEBUG=TRUE
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
volumes:
  pgdata:



